{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">🛍️ ShopNest</div>
    <h2>Create Account</h2>
    <p>Join ShopNest — it's completely free!</p>
    <form method="post">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" required placeholder="Minimum 6 characters" minlength="6" id="regPass">
          <button type="button" onclick="togglePass('regPass','regPassIcon')" class="eye-btn">
            <i class="fas fa-eye" id="regPassIcon"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Re-enter your password">
      </div>
      <button type="submit" class="btn-primary full">Create Account <i class="fas fa-arrow-right"></i></button>
    </form>
    <div class="auth-alt">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
<script>
function togglePass(id, iconId) {
  const el = document.getElementById(id);
  const icon = document.getElementById(iconId);
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
{% endblock %}
