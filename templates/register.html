{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">🛍️ ShopNest</div>
    <h2>Create Account</h2>
    <p>Free mein register karein</p>
    <form method="post">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Aapka poora naam">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="aap@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Min. 6 characters" minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Password dobara likhein">
      </div>
      <button type="submit" class="btn-primary full">Account Banao <i class="fas fa-arrow-right"></i></button>
    </form>
    <div class="auth-alt">
      Already registered? <a href="{{ url_for('login') }}">Login karein</a>
    </div>
  </div>
</div>
{% endblock %}
