{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">🛍️ ShopNest</div>
    <h2>Welcome Back!</h2>
    <p>Sign in to your account to continue</p>
    <form method="post">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" required placeholder="••••••••" id="loginPass">
          <button type="button" onclick="togglePass('loginPass','loginPassIcon')" class="eye-btn">
            <i class="fas fa-eye" id="loginPassIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary full">Sign In <i class="fas fa-arrow-right"></i></button>
    </form>
    <div class="auth-alt">
      Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </div>
    <div class="demo-creds">
      <strong>Demo Admin Login:</strong> admin@shopnest.com / admin123
    </div>
  </div>
</div>
<script>
function togglePass(id, iconId) {
  const el = document.getElementById(id);
  const icon = document.getElementById(iconId);
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
{% endblock %}
